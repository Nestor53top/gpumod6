name: Run GPUNameSwap and Screenshot

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run GPUNameSwap and capture screenshot
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Windows.Forms
          Add-Type -AssemblyName System.Drawing

          Add-Type -TypeDefinition "using System;using System.Runtime.InteropServices;public class WinAPI{[DllImport(`"user32.dll`")]public static extern bool MoveWindow(IntPtr h,int x,int y,int w,int h2,bool r);}"

          $workDir = Join-Path $PWD "GPEMODER"
          $screen = [System.Windows.Forms.Screen]::PrimaryScreen
          $sw = $screen.Bounds.Width
          $sh = $screen.Bounds.Height
          $halfW = [int]($sw / 2)

          $tm = Start-Process "taskmgr.exe" -PassThru
          Start-Sleep -Seconds 3

          $tmh = $tm.MainWindowHandle
          if ($tmh -ne [IntPtr]::Zero) {
              [WinAPI]::MoveWindow($tmh, 0, 0, $halfW, $sh, $true) | Out-Null
          }

          $gpu = Start-Process -FilePath "$workDir\GPUNameSwap.exe" -WorkingDirectory $workDir -PassThru
          Start-Sleep -Seconds 8

          $gpuh = $gpu.MainWindowHandle
          if ($gpuh -ne [IntPtr]::Zero) {
              [WinAPI]::MoveWindow($gpuh, $halfW, 0, $halfW, $sh, $true) | Out-Null
          }

          Start-Sleep -Seconds 2

          $bitmap = New-Object System.Drawing.Bitmap($sw, $sh)
          $graphics = [System.Drawing.Graphics]::FromImage($bitmap)
          $graphics.CopyFromScreen(0, 0, 0, $sw, $sh)
          $bitmap.Save("$PWD\screenshot.png")
          $graphics.Dispose()
          $bitmap.Dispose()

          if (!$gpu.HasExited) { $gpu.Kill() }
          if (!$tm.HasExited) { $tm.Kill() }

      - name: Upload screenshot
        uses: actions/upload-artifact@v4
        with:
          name: screenshot
          path: screenshot.png
