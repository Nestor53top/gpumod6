name: Run GPUNameSwap and Screenshot

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run GPUNameSwap and capture screenshot
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Windows.Forms
          Add-Type -AssemblyName System.Drawing

          $source = @'
          using System;
          using System.Drawing;
          using System.Runtime.InteropServices;

          public class ScreenCapture {
              [DllImport("user32.dll")]
              public static extern IntPtr GetDesktopWindow();

              [DllImport("user32.dll")]
              public static extern IntPtr GetWindowDC(IntPtr hWnd);

              [DllImport("gdi32.dll")]
              public static extern IntPtr CreateCompatibleDC(IntPtr hdc);

              [DllImport("gdi32.dll")]
              public static extern IntPtr CreateCompatibleBitmap(IntPtr hdc, int nWidth, int nHeight);

              [DllImport("gdi32.dll")]
              public static extern IntPtr SelectObject(IntPtr hdc, IntPtr hgdiobj);

              [DllImport("gdi32.dll")]
              public static extern bool BitBlt(IntPtr hdcDest, int nXDest, int nYDest, int nWidth, int nHeight, IntPtr hdcSrc, int nXSrc, int nYSrc, uint dwRop);

              [DllImport("gdi32.dll")]
              public static extern bool DeleteDC(IntPtr hdc);

              [DllImport("gdi32.dll")]
              public static extern bool DeleteObject(IntPtr hObject);

              [DllImport("user32.dll")]
              public static extern int ReleaseDC(IntPtr hWnd, IntPtr hDC);

              [DllImport("user32.dll")]
              public static extern int GetSystemMetrics(int nIndex);

              public static void CaptureScreen(string path) {
                  int w = GetSystemMetrics(0);
                  int h = GetSystemMetrics(1);

                  IntPtr hDesk = GetDesktopWindow();
                  IntPtr hSrcDC = GetWindowDC(hDesk);
                  IntPtr hMemDC = CreateCompatibleDC(hSrcDC);
                  IntPtr hBitmap = CreateCompatibleBitmap(hSrcDC, w, h);
                  IntPtr hOld = SelectObject(hMemDC, hBitmap);

                  BitBlt(hMemDC, 0, 0, w, h, hSrcDC, 0, 0, 0x00CC0020);

                  SelectObject(hMemDC, hOld);
                  Bitmap bmp = Image.FromHbitmap(hBitmap);
                  bmp.Save(path);

                  DeleteObject(hBitmap);
                  DeleteDC(hMemDC);
                  ReleaseDC(hDesk, hSrcDC);
              }
          }
'@
          Add-Type -TypeDefinition $source -ReferencedAssemblies System.Drawing

          $workDir = "$PWD\GPEMODER"

          $tm = Start-Process "taskmgr.exe" -PassThru
          Start-Sleep -Seconds 3

          $gpu = Start-Process -FilePath "$workDir\GPUNameSwap.exe" -WorkingDirectory $workDir -PassThru
          Start-Sleep -Seconds 8

          [ScreenCapture]::CaptureScreen("$PWD\screenshot.png")

          if (!$gpu.HasExited) { $gpu.Kill() }
          if (!$tm.HasExited) { $tm.Kill() }

      - name: Upload screenshot
        uses: actions/upload-artifact@v4
        with:
          name: screenshot
          path: screenshot.png
