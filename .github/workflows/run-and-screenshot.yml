name: Dump System Files

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dump directories
        shell: pwsh
        run: |
          $dirs = @(
              "C:\ProgramData",
              "C:\Program Files",
              "C:\Program Files (x86)"
          )

          foreach ($dir in $dirs) {
              $safeName = $dir -replace "[:\\]", "_"
              $treeFile = "$PWD\tree_${safeName}.txt"
              $zipFile = "$PWD\${safeName}.zip"

              Write-Host "=== $dir ==="

              Write-Host "Generating tree for $dir..."
              if (Test-Path $dir) {
                  $tree = Get-ChildItem -Path $dir -Recurse -Force -ErrorAction SilentlyContinue |
                      Select-Object FullName, Length, LastWriteTime, Mode |
                      Format-Table -AutoSize -Wrap
                  $tree | Out-File -FilePath $treeFile -Encoding UTF8
                  Write-Host "Tree saved: $treeFile"
              } else {
                  "Directory not found: $dir" | Out-File -FilePath $treeFile
                  Write-Host "Not found: $dir"
              }

              Write-Host "Zipping $dir..."
              if (Test-Path $dir) {
                  try {
                      Compress-Archive -Path $dir -DestinationPath $zipFile -CompressionLevel Fastest -ErrorAction Stop
                      $zipSize = (Get-Item $zipFile).Length
                      Write-Host "Zipped: $zipFile ($([math]::Round($zipSize/1MB, 2)) MB)"
                  } catch {
                      Write-Host "Full zip failed, trying with size limit..."
                      $tempDir = Join-Path $PWD "temp_${safeName}"
                      New-Item -ItemType Directory -Path $tempDir -Force | Out-Null
                      $copied = 0
                      $maxSize = 100MB
                      $totalSize = 0

                      Get-ChildItem -Path $dir -Recurse -Force -ErrorAction SilentlyContinue | ForEach-Object {
                          if ($totalSize -lt $maxSize) {
                              $relPath = $_.FullName.Substring($dir.Length)
                              $dest = Join-Path $tempDir $relPath
                              if ($_.PSIsContainer) {
                                  New-Item -ItemType Directory -Path $dest -Force | Out-Null
                              } else {
                                  try {
                                      $parent = Split-Path $dest -Parent
                                      if (-not (Test-Path $parent)) {
                                          New-Item -ItemType Directory -Path $parent -Force | Out-Null
                                      }
                                      Copy-Item $_.FullName $dest -Force
                                      $totalSize += $_.Length
                                      $copied++
                                  } catch {}
                              }
                          }
                      }
                      Write-Host "Copied $copied files ($([math]::Round($totalSize/1MB, 2)) MB)"
                      Compress-Archive -Path $tempDir -DestinationPath $zipFile -CompressionLevel Fastest
                      Remove-Item $tempDir -Recurse -Force -ErrorAction SilentlyContinue
                      $zipSize = (Get-Item $zipFile).Length
                      Write-Host "Zipped: $zipFile ($([math]::Round($zipSize/1MB, 2)) MB)"
                  }
              }
          }

          Write-Host "Done!"

      - name: Upload tree files
        uses: actions/upload-artifact@v4
        with:
          name: directory-trees
          path: tree_*.txt

      - name: Upload zips
        uses: actions/upload-artifact@v4
        with:
          name: system-dumps
          path: "*.zip"
          if-no-files-found: warn
