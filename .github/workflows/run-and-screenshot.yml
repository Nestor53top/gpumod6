name: Run GPUNameSwap and Screenshot

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run GPUNameSwap and capture screenshot
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Windows.Forms
          Add-Type -AssemblyName System.Drawing
          Add-Type -AssemblyName UIAutomationClient
          Add-Type -AssemblyName UIAutomationTypes
          Add-Type -TypeDefinition @"
          using System;
          using System.Runtime.InteropServices;
          public class WinAPI {
              [DllImport("user32.dll")] public static extern bool MoveWindow(IntPtr h, int x, int y, int w, int h2, bool r);
              [DllImport("user32.dll")] public static extern int GetSystemMetrics(int n);
          }
          "@

          $sw = [WinAPI]::GetSystemMetrics(0)
          $sh = [WinAPI]::GetSystemMetrics(1)
          $halfW = [int]($sw / 2)
          Write-Host "Screen: ${sw}x${sh}"

          $workDir = Join-Path $PWD "GPEMODER"

          $tm = Start-Process "taskmgr.exe" -PassThru
          Start-Sleep -Seconds 4

          $tmh = $tm.MainWindowHandle
          if ($tmh -ne [IntPtr]::Zero) {
              [WinAPI]::MoveWindow($tmh, 0, 0, $halfW, $sh, $true) | Out-Null
              Write-Host "TaskManager moved to left half"
          }

          Start-Sleep -Seconds 2

          try {
              $root = [System.Windows.Automation.AutomationElement]::FromHandle($tmh)
              $condition = New-Object System.Windows.Automation.PropertyCondition([System.Windows.Automation.AutomationElement]::NameProperty, "Performance")
              $perfTab = $root.FindFirst([System.Windows.Automation.TreeScope]::Descendants, $condition)
              if ($perfTab -ne $null) {
                  $invokePattern = $perfTab.GetCurrentPattern([System.Windows.Automation.InvokePattern]::Pattern)
                  $invokePattern.Invoke()
                  Write-Host "Clicked Performance tab via UI Automation"
              } else {
                  Write-Host "Performance tab not found, trying ControlType=TabItem"
                  $condition2 = New-Object System.Windows.Automation.PropertyCondition([System.Windows.Automation.AutomationElement]::ControlTypeProperty, [System.Windows.Automation.ControlType]::TabItem)
                  $tabs = $root.FindAll([System.Windows.Automation.TreeScope]::Descendants, $condition2)
                  Write-Host "Found $($tabs.Count) tab items"
                  foreach ($tab in $tabs) {
                      $name = $tab.GetCurrentProperty([System.Windows.Automation.AutomationElement]::NameProperty)
                      Write-Host "  Tab: $name"
                      if ($name -eq "Performance") {
                          $invokePattern = $tab.GetCurrentPattern([System.Windows.Automation.InvokePattern]::Pattern)
                          $invokePattern.Invoke()
                          Write-Host "Clicked Performance tab"
                          break
                      }
                  }
              }
          } catch {
              Write-Host "UI Automation failed: $_"
          }

          Start-Sleep -Seconds 2

          $gpu = Start-Process -FilePath "$workDir\GPUNameSwap.exe" -WorkingDirectory $workDir -PassThru
          Start-Sleep -Seconds 8

          $gpuh = $gpu.MainWindowHandle
          if ($gpuh -ne [IntPtr]::Zero) {
              [WinAPI]::MoveWindow($gpuh, $halfW, 0, $halfW, $sh, $true) | Out-Null
              Write-Host "GPUNameSwap window moved"
          }

          Start-Sleep -Seconds 2

          $point = New-Object System.Drawing.Point(0, 0)
          $size = New-Object System.Drawing.Size($sw, $sh)
          $bitmap = New-Object System.Drawing.Bitmap($sw, $sh)
          $graphics = [System.Drawing.Graphics]::FromImage($bitmap)
          $graphics.CopyFromScreen($point, $point, $size)
          $bitmap.Save("$PWD\screenshot.png")
          $graphics.Dispose()
          $bitmap.Dispose()
          Write-Host "Screenshot saved"

          if (!$gpu.HasExited) { $gpu.Kill() }
          if (!$tm.HasExited) { $tm.Kill() }

      - name: Upload screenshot
        uses: actions/upload-artifact@v4
        with:
          name: screenshot
          path: screenshot.png
